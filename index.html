<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園自動鐘聲系統</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e94560;
            --accent: #0f3460;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 啟動遮罩：解決瀏覽器音訊自動播放限制 */
        #setupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 350px;
            border: 1px solid var(--accent);
        }

        #clock {
            font-size: 3.5rem;
            font-weight: bold;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }

        .status-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .next-label { color: #95a5a6; font-size: 0.9rem; margin-bottom: 5px; }
        
        #typeTag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        #targetDisplay {
            font-size: 2.2rem;
            font-weight: bold;
            display: block;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #ff5e78;
            transform: translateY(-2px);
        }

        #startBtn {
            background: #00d2ff;
            font-size: 1.5rem;
            width: auto;
            padding: 20px 50px;
        }

        .footer-note {
            font-size: 0.8rem;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="setupOverlay">
    <h1 style="color: #00d2ff;">🔔 鐘聲系統</h1>
    <p>為了確保聲音能準確播放，請點擊下方按鈕啟動</p>
    <button id="startBtn" onclick="initSystem()">啟動系統</button>
</div>

<div class="card">
    <div id="date" style="color: #95a5a6;">2026/03/22</div>
    <div id="clock">00:00:00</div>
    
    <div class="status-area">
        <div class="next-label">下次鳴響</div>
        <div id="typeTag" style="background: #555;">尚未設定</div>
        <span id="targetDisplay">-- : --</span>
    </div>

    <button onclick="setNextBell()">設定下次鐘聲</button>
    
    <div class="footer-note">
        請保持此分頁開啟，勿縮小視窗
    </div>
</div>

<audio id="startAudio" src="start.mp3" preload="auto"></audio>
<audio id="endAudio" src="end.mp3" preload="auto"></audio>

<script>
    let targetTime = "";
    let bellType = ""; // "上課" 或 "下課"

    // 初始化系統：解鎖瀏覽器音訊權限
    function initSystem() {
        const a1 = document.getElementById('startAudio');
        const a2 = document.getElementById('endAudio');
        
        // 播放靜音/極短片段來獲取權限
        const unlock = (a) => {
            a.play().then(() => {
                a.pause();
                a.currentTime = 0;
            }).catch(e => console.error("Audio unlock failed", e));
        };

        unlock(a1);
        unlock(a2);

        document.getElementById('setupOverlay').style.display = 'none';
        setNextBell();
    }

    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const currentHM = `${h}:${m}`;
        
        document.getElementById('date').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
        document.getElementById('clock').innerText = `${h}:${m}:${s}`;

        // 判斷時間到 (秒數必須為 00 避免重複觸發)
        if (currentHM === targetTime && s === "00") {
            playBell();
        }
    }

    function playBell() {
        const audioId = (bellType === "上課") ? "startAudio" : "endAudio";
        const audio = document.getElementById(audioId);
        
        audio.play();

        // 彈出提醒並自動進入下一次設定
        setTimeout(() => {
            alert(`🔔 ${bellType} 時間到！(${targetTime})`);
            setNextBell();
        }, 1000);
    }

    function setNextBell() {
        let timeInput = prompt("請輸入下次打鐘時間 (24小時制 HH:mm)\n例如 08:10 或 16:30", targetTime || "");
        
        if (timeInput && /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(timeInput)) {
            // 使用 confirm 讓使用者選擇類型
            let isStart = confirm(`設定時間：${timeInput}\n\n這是一次「上課鐘」嗎？\n(按【確定】為上課鐘，按【取消】為下課鐘)`);
            
            targetTime = timeInput;
            bellType = isStart ? "上課" : "下課";
            updateUI();
        } else if (timeInput !== null) {
            alert("格式錯誤，請輸入如 09:30 的格式。");
            setNextBell();
        }
    }

    function updateUI() {
        const display = document.getElementById('targetDisplay');
        const tag = document.getElementById('typeTag');
        
        display.innerText = targetTime;
        tag.innerText = bellType;
        
        if (bellType === "上課") {
            tag.style.background = "#e94560"; // 紅色
            display.style.color = "#e94560";
        } else {
            tag.style.background = "#27ae60"; // 綠色
            display.style.color = "#27ae60";
        }
    }

    // 每秒更新一次時鐘
    setInterval(updateClock, 1000);
</script>

</body>
</html>
