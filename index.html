<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <title>自動鐘聲系統</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        /* 啟動遮罩：強迫使用者點擊以獲得音訊權限 */
        #setupOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .card { background: #2c3e50; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 350px; }
        #clock { font-size: 4rem; font-family: 'Courier New', monospace; color: #f1c40f; margin: 20px 0; }
        .info { font-size: 1.2rem; color: #bdc3c7; margin-bottom: 20px; }
        .tag { display: inline-block; padding: 5px 15px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
        button { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; width: 100%; transition: 0.3s; }
        button:hover { background: #2980b9; }
        #startBtn { background: #27ae60; font-size: 1.5rem; }
    </style>
</head>
<body>

<div id="setupOverlay">
    <h1>🔔 鐘聲系統</h1>
    <p>請點擊下方按鈕以啟動音訊權限</p>
    <button id="startBtn" onclick="unlockAudio()">點擊啟動系統</button>
</div>

<div class="card">
    <div id="date">2026/03/22</div>
    <div id="clock">00:00:00</div>
    <div class="info">
        <div id="typeTag" class="tag" style="background: #7f8c8d;">尚未設定</div><br>
        下次時間：<span id="targetDisplay" style="font-weight: bold; font-size: 1.5rem;">--:--</span>
    </div>
    <button onclick="manualSet()">更改下一次設定</button>
</div>

<audio id="startAudio" src="start.mp3" preload="auto"></audio>
<audio id="endAudio" src="end.mp3" preload="auto"></audio>

<script>
    let targetTime = "";
    let bellType = "";

    function unlockAudio() {
        // 解鎖音訊
        document.getElementById('startAudio').play().then(() => {
            document.getElementById('startAudio').pause();
        }).catch(() => {});
        
        document.getElementById('endAudio').play().then(() => {
            document.getElementById('endAudio').pause();
        }).catch(() => {});

        document.getElementById('setupOverlay').style.display = 'none';
        manualSet();
    }

    function update() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const currentHM = `${h}:${m}`;
        
        document.getElementById('date').innerText = now.toLocaleDateString();
        document.getElementById('clock').innerText = `${h}:${m}:${s}`;

        if (currentHM === targetTime && s === "00") {
            const audio = document.getElementById(bellType === "上課" ? "startAudio" : "endAudio");
            audio.play();
            
            setTimeout(() => {
                alert(`【${bellType}】時間到！`);
                manualSet();
            }, 500);
        }
    }

    function manualSet() {
        let time = prompt("下次打鐘時間? (HH:mm)", targetTime || "");
        if (time && /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(time)) {
            let isClass = confirm("確定：上課鐘 🔴\n取消：下課鐘 🟢");
            targetTime = time;
            bellType = isClass ? "上課" : "下課";
            
            const tag = document.getElementById('typeTag');
            tag.innerText = bellType;
            tag.style.background = isClass ? "#e74c3c" : "#27ae60";
            document.getElementById('targetDisplay').innerText = targetTime;
        }
    }

    setInterval(update, 1000);
</script>
</body>
</html>
